<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ghazal — Threads Agent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-dark:#8B6914;
  --green:#1A3A2A;--green2:#2D5A3D;
  --cream:#FAF7F0;--cream2:#F0EAD8;
  --txt:#1A1A1A;--txt2:#666;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--green);min-height:100vh;color:var(--txt)}
.header{text-align:center;padding:28px 20px 20px;border-bottom:0.5px solid rgba(201,168,76,.15)}
.h-arabic{font-size:44px;color:var(--gold);display:block;line-height:1;margin-bottom:4px}
.h-name{font-size:20px;color:var(--cream);letter-spacing:6px;text-transform:uppercase}
.h-sub{font-size:11px;color:rgba(201,168,76,.45);letter-spacing:2px;text-transform:uppercase;margin-top:5px}
.wrap{padding:20px 16px 100px;max-width:600px;margin:0 auto}
.card{background:rgba(255,255,255,.04);border:0.5px solid rgba(201,168,76,.15);border-radius:14px;padding:16px;margin-bottom:14px}
.card-label{font-size:10px;color:rgba(201,168,76,.55);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.api-row{display:flex;gap:8px}
.api-input{flex:1;background:rgba(0,0,0,.3);border:0.5px solid rgba(201,168,76,.2);border-radius:9px;padding:11px 13px;font-size:14px;color:var(--cream);font-family:inherit;outline:none;min-width:0}
.api-input::placeholder{color:rgba(250,247,240,.2);font-size:13px}
.btn-save{padding:11px 16px;background:rgba(201,168,76,.12);border:0.5px solid rgba(201,168,76,.3);border-radius:9px;color:var(--gold);font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.key-ok{font-size:11px;color:#7ED4A0;margin-top:7px;display:none}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.topic-btn{padding:9px 10px;background:rgba(0,0,0,.2);border:0.5px solid rgba(201,168,76,.15);border-radius:9px;color:rgba(250,247,240,.55);font-size:12px;font-family:inherit;cursor:pointer;text-align:left;line-height:1.35;-webkit-tap-highlight-color:transparent;transition:all .15s}
.topic-btn:active{background:rgba(201,168,76,.1)}
.topic-btn.active{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.4);color:var(--gold)}
.topic-divider{font-size:10px;color:rgba(201,168,76,.3);letter-spacing:1px;text-align:center;margin:10px 0 8px;text-transform:uppercase}
.topik-input{width:100%;background:rgba(0,0,0,.3);border:0.5px solid rgba(201,168,76,.15);border-radius:9px;padding:11px 13px;font-size:14px;color:var(--cream);font-family:inherit;resize:none;outline:none;min-height:60px;line-height:1.6}
.topik-input::placeholder{color:rgba(250,247,240,.2);font-size:13px}
.topic-clear{font-size:11px;color:rgba(201,168,76,.4);cursor:pointer;margin-top:6px;display:none;-webkit-tap-highlight-color:transparent}
.btn-gen{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;border-radius:12px;color:var(--green);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:24px;-webkit-tap-highlight-color:transparent}
.btn-gen:disabled{opacity:.5}
.btn-gen:active{opacity:.85}
.loading{text-align:center;padding:40px 0;display:none}
.spin{width:36px;height:36px;border:2px solid rgba(201,168,76,.1);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:rgba(201,168,76,.5);letter-spacing:1px}
.err-box{background:rgba(220,50,50,.08);border:0.5px solid rgba(220,50,50,.25);border-radius:10px;padding:12px 14px;color:#FF8A8A;font-size:13px;margin-bottom:16px;display:none;line-height:1.5}
.post-card{background:var(--cream);border-radius:14px;overflow:hidden;margin-bottom:14px;animation:up .35s ease both}
.post-card:nth-child(2){animation-delay:.08s}
.post-card:nth-child(3){animation-delay:.16s}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.post-head{padding:11px 16px;display:flex;align-items:center;gap:10px}
.ph-pagi{background:#FFF8E8;border-bottom:1px solid #F0E4B8}
.ph-siang{background:#EAF4F0;border-bottom:1px solid #C5DDD4}
.ph-malam{background:#EEF0F8;border-bottom:1px solid #C8CCE0}
.slot-emoji{font-size:20px;line-height:1}
.slot-lbl{font-size:14px;font-weight:500;color:var(--txt)}
.slot-time{font-size:11px;color:var(--txt2);margin-top:1px}
.post-body{padding:16px;font-size:15px;line-height:1.65;color:var(--txt);white-space:pre-wrap;border-bottom:1px solid var(--cream2)}
.post-foot{padding:10px 16px;background:var(--cream2);display:flex;align-items:center;justify-content:space-between}
.char-lbl{font-size:11px;color:var(--txt2)}
.btn-copy{padding:10px 0;background:var(--green);color:var(--gold);border:none;border-radius:8px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;width:110px;text-align:center;transition:background .15s}
.btn-copy:active{background:var(--green2)}
.btn-copy.ok{background:#1a4a2a;color:#7ED4A0}
.copy-ta{position:fixed;top:50%;left:50%;width:2px;height:2px;opacity:0;pointer-events:none;font-size:16px}
.footer{text-align:center;padding:32px 0 16px;font-size:11px;color:rgba(250,247,240,.15);letter-spacing:1px}
</style>
</head>
<body>
<div class="header">
  <span class="h-arabic">&#x063A;&#x0632;&#x0627;&#x0644;</span>
  <div class="h-name">Ghazal</div>
  <div class="h-sub">Threads Content Agent</div>
</div>
<div class="wrap">
  <div class="card">
    <div class="card-label">Claude API Key</div>
    <div class="api-row">
      <input type="password" class="api-input" id="api-key" placeholder="sk-ant-api03-...">
      <button class="btn-save" onclick="saveKey()">Simpan</button>
    </div>
    <div class="key-ok" id="key-ok">&#10003; Tersimpan</div>
  </div>

  <div class="card">
    <div class="card-label">Pilih topik hari ini</div>
    <div class="topic-grid" id="topic-grid">
      <button class="topic-btn" onclick="pilihTopik(this, 'Momen pertama kali melihat Kabah — bukan di foto, bukan di mimpi')">👁 Pertama lihat Kabah</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Perasaan saat tawaf — tubuh digerakkan tapi hati yang nangis')">🕋 Tawaf pertama</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Air zamzam — dingin, beda rasanya, seperti sesuatu yang belum pernah ada sebelumnya')">💧 Minum zamzam</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Duduk berjam-jam di depan Kabah, nggak mau kemana-mana')">🌙 Duduk depan Kabah</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Nangis di Multazam — bukan karena sedih, tapi karena ngerasa akhirnya sampai')">😢 Nangis di Multazam</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Subuh di Masjid Nabawi — sunyi, sejuk, ngerasa seperti tamu yang disambut')">🌅 Subuh Masjid Nabawi</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Aroma Masjidil Haram — susah dijelasin, tapi sekali cium langsung keinget semua')">🌿 Aroma Masjidil Haram</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Pesawat take off dari Makkah — ngerasa ada yang ketinggalan, dan itu bukan barang')">✈️ Pulang dari Makkah</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Wukuf di Arafah — ribuan orang, tapi ngerasa cuma berdua sama Allah')">🤲 Wukuf di Arafah</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Rindu pada versi diri sendiri yang lebih tenang, lebih yakin, lebih dekat sama Allah — waktu di sana')">🪞 Rindu diri di sana</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Foto-foto umroh tiba-tiba muncul di galeri — dan dadanya sesak lagi')">📱 Foto umroh di galeri</button>
      <button class="topic-btn" onclick="pilihTopik(this, 'Talbiyah pertama — suara sendiri gemetar, tapi ngerasa paling hidup')">🔊 Talbiyah pertama</button>
    </div>
    <div class="topic-divider">atau tulis sendiri</div>
    <textarea class="topik-input" id="topik" placeholder="Tulis topik spesifik di sini..."></textarea>
    <div class="topic-clear" id="topic-clear" onclick="clearTopik()">✕ Hapus pilihan</div>
  </div>

  <button class="btn-gen" id="gen-btn" onclick="generate()">
    ✦ Generate 3 Post Hari Ini
  </button>

  <div class="err-box" id="err-box"></div>
  <div class="loading" id="loading">
    <div class="spin"></div>
    <div class="loading-txt">Sedang menulis...</div>
  </div>
  <div id="output"></div>
  <div class="footer">Ghazal · Freca Group Indonesia</div>
</div>
<textarea class="copy-ta" id="copy-ta" readonly></textarea>

<script>
var selectedTopic = '';

function pilihTopik(btn, topik) {
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    selectedTopic = '';
    document.getElementById('topic-clear').style.display = 'none';
    return;
  }
  document.querySelectorAll('.topic-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  selectedTopic = topik;
  document.getElementById('topik').value = '';
  document.getElementById('topic-clear').style.display = 'block';
}

function clearTopik() {
  document.querySelectorAll('.topic-btn').forEach(function(b){ b.classList.remove('active'); });
  selectedTopic = '';
  document.getElementById('topik').value = '';
  document.getElementById('topic-clear').style.display = 'none';
}

window.onload = function() {
  var k = localStorage.getItem('ghazal_key');
  if (k) {
    document.getElementById('api-key').value = k;
    document.getElementById('key-ok').style.display = 'block';
  }
  document.getElementById('topik').addEventListener('input', function() {
    if (this.value.trim()) {
      document.querySelectorAll('.topic-btn').forEach(function(b){ b.classList.remove('active'); });
      selectedTopic = '';
      document.getElementById('topic-clear').style.display = 'none';
    }
  });
};

function saveKey() {
  var k = document.getElementById('api-key').value.trim();
  if (!k) return;
  localStorage.setItem('ghazal_key', k);
  var el = document.getElementById('key-ok');
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 2500);
}

function getKey() {
  return document.getElementById('api-key').value.trim() || localStorage.getItem('ghazal_key') || '';
}

function getTopik() {
  return document.getElementById('topik').value.trim() || selectedTopic || '';
}

function normalizeText(s) {
  return s.replace(/\n{2,}/g, '\n').trim();
}

async function generate() {
  var key = getKey();
  if (!key) { showErr('Masukkan Claude API Key dulu.'); return; }

  var topik = getTopik();
  var btn = document.getElementById('gen-btn');
  var loading = document.getElementById('loading');
  var output = document.getElementById('output');

  btn.disabled = true;
  loading.style.display = 'block';
  output.innerHTML = '';
  hideErr();

  var prompt =
'Kamu content writer untuk wewangian Ghazal di Threads.\n\n' +
'GHAZAL: obat rindu untuk yang sudah pulang dari tanah suci tapi hatinya masih di sana. Bukan parfum untuk dibawa umroh.\n\n' +
'CARA MENYEBUT GHAZAL — INI YANG PALING PENTING:\n' +
'Ghazal harus muncul SETELAH cerita selesai dibangun.\n' +
'Penyebutannya harus terasa seperti penemuan pribadi, bukan kesimpulan iklan.\n' +
'Selalu ada jembatan konteks sebelum sebut Ghazal — jangan tiba-tiba.\n\n' +
'VARIASI CARA SEBUT GHAZAL (jangan selalu sama):\n' +
'- "Sampai aku pulang dan nemuin Ghazal."\n' +
'- "Wewangian Ghazal yang pertama kali bawa aku balik ke sana."\n' +
'- "Sekarang, Ghazal yang jagain rindu itu."\n' +
'- "Aku nemuin Ghazal. Dan tiba-tiba aku ada di sana lagi."\n' +
'- "Di rumah, yang paling deket sama perasaan itu adalah Ghazal."\n\n' +
'YANG SALAH:\n' +
'❌ "Wewangian Ghazal bawa balik suara itu ke telinga aku." (tiba-tiba, tanpa jembatan)\n' +
'❌ "Wewangian Ghazal itu yang bikin aku inget perasaan itu lagi." (terasa iklan)\n' +
'❌ Setiap post selalu diakhiri "Wewangian Ghazal..."\n\n' +
'YANG BENAR:\n' +
'✅ Cerita dulu sampai tuntas. Emosi naik dulu. LALU Ghazal masuk natural.\n' +
'✅ "Dua tahun nunggu, mimpi, cicil, berdoa. \'Akhirnya.\' Kata itu masih aku denger sampai sekarang. Setelah pulang, aku nemuin Ghazal. Tiap cium wanginya, kata itu muncul lagi."\n\n' +
'DIKSI: pakai kata sensoris, spesifik, visceral. Bukan "indah" tapi "bikin dada sesak". Bukan "berkesan" tapi "nggak bisa dilupain".\n\n' +
'FORMAT:\n' +
'- Enter sekali antar baris\n' +
'- Maks 270 karakter per post\n' +
'- Maks 2 hashtag\n' +
'- Maks 1 emoji\n' +
'- Jangan mulai dengan salam\n' +
'- Pakai "Allah" bukan "Tuhan"\n' +
'- Mix natural dan puitis\n\n' +
(topik
  ? 'TOPIK: ' + topik + '\n\nBuat 3 post dari sudut berbeda topik yang sama.\nPagi: momen spesifik, ringan tapi ngena.\nSiang: satu detail kecil yang sangat powerful.\nMalam: paling emosional — cerita dulu panjang, Ghazal masuk di akhir sebagai penemuan.\n\n'
  : 'Pilih 3 topik BERBEDA. Jangan mirip satu sama lain.\nPagi: momen ringan tapi ngena.\nSiang: lebih berat secara emosional.\nMalam: paling personal — cerita dulu dalam, Ghazal masuk di akhir sebagai penemuan.\n\n') +
'Balas HANYA JSON:\n' +
'{"posts":[{"slot":"pagi","content":"..."},{"slot":"siang","content":"..."},{"slot":"malam","content":"..."}]}';

  try {
    var res = await fetch('https://ghazal-proxy.ubed-fahmi.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      var errData = await res.json();
      throw new Error(errData.error && errData.error.message ? errData.error.message : 'Error ' + res.status);
    }

    var data = await res.json();
    var raw = data.content.map(function(i){ return i.text || ''; }).join('');
    var jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Format tidak valid, coba lagi.');
    var parsed = JSON.parse(jsonMatch[0]);
    if (!parsed.posts || !parsed.posts.length) throw new Error('Konten kosong, coba lagi.');
    renderPosts(parsed.posts);

  } catch(e) {
    showErr('Gagal: ' + e.message);
  }

  btn.disabled = false;
  loading.style.display = 'none';
}

var slotCfg = {
  pagi:  {emoji:'🌅', label:'Pagi',  time:'07:00', cls:'ph-pagi'},
  siang: {emoji:'☀️', label:'Siang', time:'12:00', cls:'ph-siang'},
  malam: {emoji:'🌙', label:'Malam', time:'20:00', cls:'ph-malam'}
};

function renderPosts(posts) {
  var output = document.getElementById('output');
  output.innerHTML = '';
  for (var i = 0; i < posts.length; i++) {
    var p = posts[i];
    var cfg = slotCfg[p.slot] || slotCfg.pagi;
    var bodyId = 'pb' + i;
    var btnId = 'bc' + i;
    var txt = normalizeText(p.content);
    var card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML =
      '<div class="post-head ' + cfg.cls + '">' +
        '<span class="slot-emoji">' + cfg.emoji + '</span>' +
        '<div><div class="slot-lbl">' + cfg.label + '</div><div class="slot-time">' + cfg.time + ' WIB</div></div>' +
      '</div>' +
      '<div class="post-body" id="' + bodyId + '">' + escHtml(txt) + '</div>' +
      '<div class="post-foot">' +
        '<span class="char-lbl">' + txt.length + ' karakter</span>' +
        '<button class="btn-copy" id="' + btnId + '" onclick="copyPost(\'' + bodyId + '\',\'' + btnId + '\')">Salin</button>' +
      '</div>';
    output.appendChild(card);
  }
}

function copyPost(bodyId, btnId) {
  var el = document.getElementById(bodyId);
  var btn = document.getElementById(btnId);
  var text = el.innerText || el.textContent;
  if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
    navigator.clipboard.writeText(text).then(function() { flashOk(btn); }).catch(function() { fallbackCopy(text, btn); });
    return;
  }
  fallbackCopy(text, btn);
}

function fallbackCopy(text, btn) {
  var ta = document.getElementById('copy-ta');
  ta.removeAttribute('readonly');
  ta.value = text;
  ta.focus(); ta.select();
  var range = document.createRange();
  range.selectNodeContents(ta);
  var sel = window.getSelection();
  if (sel) { sel.removeAllRanges(); sel.addRange(range); }
  ta.setSelectionRange(0, 999999);
  var ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  ta.setAttribute('readonly', ''); ta.blur();
  if (ok) { flashOk(btn); } else { flashFail(btn); }
}

function flashOk(btn) {
  btn.textContent = '✓ Tersalin';
  btn.classList.add('ok');
  setTimeout(function(){ btn.textContent = 'Salin'; btn.classList.remove('ok'); }, 2000);
}
function flashFail(btn) {
  btn.textContent = 'Coba lagi';
  setTimeout(function(){ btn.textContent = 'Salin'; }, 2000);
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showErr(msg) {
  var el = document.getElementById('err-box');
  el.textContent = msg; el.style.display = 'block';
}
function hideErr() { document.getElementById('err-box').style.display = 'none'; }
</script>
</body>
</html>
