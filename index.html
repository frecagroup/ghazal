<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ghazal — Threads Agent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-dark:#8B6914;
  --green:#1A3A2A;--green2:#2D5A3D;
  --cream:#FAF7F0;--cream2:#F0EAD8;
  --txt:#1A1A1A;--txt2:#666;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--green);min-height:100vh;color:var(--txt)}
.header{text-align:center;padding:32px 20px 24px;border-bottom:0.5px solid rgba(201,168,76,.15)}
.h-arabic{font-size:44px;color:var(--gold);display:block;line-height:1;margin-bottom:4px}
.h-name{font-size:20px;color:var(--cream);letter-spacing:6px;text-transform:uppercase}
.h-sub{font-size:11px;color:rgba(201,168,76,.45);letter-spacing:2px;text-transform:uppercase;margin-top:5px}
.wrap{padding:20px 16px 100px;max-width:600px;margin:0 auto}
.card{background:rgba(255,255,255,.04);border:0.5px solid rgba(201,168,76,.15);border-radius:14px;padding:16px;margin-bottom:14px}
.card-label{font-size:10px;color:rgba(201,168,76,.55);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.api-row{display:flex;gap:8px}
.api-input{flex:1;background:rgba(0,0,0,.3);border:0.5px solid rgba(201,168,76,.2);border-radius:9px;padding:11px 13px;font-size:14px;color:var(--cream);font-family:inherit;outline:none;min-width:0}
.api-input::placeholder{color:rgba(250,247,240,.2);font-size:13px}
.btn-save{padding:11px 16px;background:rgba(201,168,76,.12);border:0.5px solid rgba(201,168,76,.3);border-radius:9px;color:var(--gold);font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.key-ok{font-size:11px;color:#7ED4A0;margin-top:7px;display:none}
.topik-input{width:100%;background:rgba(0,0,0,.3);border:0.5px solid rgba(201,168,76,.15);border-radius:9px;padding:12px 13px;font-size:14px;color:var(--cream);font-family:inherit;resize:none;outline:none;min-height:80px;line-height:1.6}
.topik-input::placeholder{color:rgba(250,247,240,.2);font-size:13px}
.btn-gen{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;border-radius:12px;color:var(--green);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:24px;-webkit-tap-highlight-color:transparent}
.btn-gen:disabled{opacity:.5}
.btn-gen:active{opacity:.85}
.loading{text-align:center;padding:40px 0;display:none}
.spin{width:36px;height:36px;border:2px solid rgba(201,168,76,.1);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:rgba(201,168,76,.5);letter-spacing:1px}
.err-box{background:rgba(220,50,50,.08);border:0.5px solid rgba(220,50,50,.25);border-radius:10px;padding:12px 14px;color:#FF8A8A;font-size:13px;margin-bottom:16px;display:none;line-height:1.5}
.post-card{background:var(--cream);border-radius:14px;overflow:hidden;margin-bottom:14px;animation:up .35s ease both}
.post-card:nth-child(2){animation-delay:.08s}
.post-card:nth-child(3){animation-delay:.16s}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.post-head{padding:11px 16px;display:flex;align-items:center;gap:10px}
.ph-pagi{background:#FFF8E8;border-bottom:1px solid #F0E4B8}
.ph-siang{background:#EAF4F0;border-bottom:1px solid #C5DDD4}
.ph-malam{background:#EEF0F8;border-bottom:1px solid #C8CCE0}
.slot-emoji{font-size:20px;line-height:1}
.slot-lbl{font-size:14px;font-weight:500;color:var(--txt)}
.slot-time{font-size:11px;color:var(--txt2);margin-top:1px}
.post-body{padding:16px;font-size:15px;line-height:1.6;color:var(--txt);white-space:pre-wrap;border-bottom:1px solid var(--cream2)}
.post-foot{padding:10px 16px;background:var(--cream2);display:flex;align-items:center;justify-content:space-between}
.char-lbl{font-size:11px;color:var(--txt2)}
.btn-copy{padding:10px 0;background:var(--green);color:var(--gold);border:none;border-radius:8px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;width:110px;text-align:center;transition:background .15s}
.btn-copy:active{background:var(--green2)}
.btn-copy.ok{background:#1a4a2a;color:#7ED4A0}
.copy-ta{position:fixed;top:50%;left:50%;width:2px;height:2px;opacity:0;pointer-events:none;font-size:16px}
.footer{text-align:center;padding:32px 0 16px;font-size:11px;color:rgba(250,247,240,.15);letter-spacing:1px}
</style>
</head>
<body>
<div class="header">
  <span class="h-arabic">&#x063A;&#x0632;&#x0627;&#x0644;</span>
  <div class="h-name">Ghazal</div>
  <div class="h-sub">Threads Content Agent</div>
</div>
<div class="wrap">
  <div class="card">
    <div class="card-label">Claude API Key</div>
    <div class="api-row">
      <input type="password" class="api-input" id="api-key" placeholder="sk-ant-api03-...">
      <button class="btn-save" onclick="saveKey()">Simpan</button>
    </div>
    <div class="key-ok" id="key-ok">&#10003; Tersimpan</div>
  </div>
  <div class="card">
    <div class="card-label">Topik hari ini (opsional)</div>
    <textarea class="topik-input" id="topik" placeholder="Kosongkan = AI pilih sendiri&#10;Contoh: rindu Raudhah, kenangan tawaf pertama, dll..."></textarea>
  </div>
  <button class="btn-gen" id="gen-btn" onclick="generate()">
    ✦ Generate 3 Post Hari Ini
  </button>
  <div class="err-box" id="err-box"></div>
  <div class="loading" id="loading">
    <div class="spin"></div>
    <div class="loading-txt">Sedang menulis...</div>
  </div>
  <div id="output"></div>
  <div class="footer">Ghazal · Freca Group Indonesia</div>
</div>
<textarea class="copy-ta" id="copy-ta" readonly></textarea>

<script>
var TOPIC_POOL = [
  "momen pertama kali melihat Kabah langsung — bukan di foto, bukan di video",
  "perasaan waktu tawaf dan ngerasa kecil banget di tengah jutaan manusia",
  "air zamzam yang dingin di tengah panasnya Makkah",
  "momen duduk berjam-jam mandangin Kabah tanpa ngapa-ngapain",
  "nangis di Multazam tanpa tahu kenapa, tapi ngerasa lega banget",
  "shalat subuh berjamaah di Masjid Nabawi — sunyi tapi ngerasa penuh",
  "aroma khas Masjidil Haram yang susah dijelasin tapi langsung bikin rindu",
  "perasaan berat waktu pesawat take off ninggalin Makkah",
  "kenangan sahur di hotel dekat Masjidil Haram, dengerin azan subuh",
  "momen ihram dilepas untuk terakhir kali — campur aduk rasanya",
  "pulang dari tanah suci tapi ngerasa dunia biasa terasa asing",
  "foto-foto umroh tiba-tiba muncul di galeri HP dan bikin sesak",
  "kangen desak-desakan di Raudhah — capek tapi mau lagi",
  "wukuf di Arafah — ngerasa semua orang di sana sama-sama butuh Allah",
  "aroma bukhur yang tiba-tiba bikin keinget suasana masjid di sana",
  "teman seperjalanan yang baru kenal tapi ngerasa sudah saudara lama",
  "rindu pada versi diri sendiri yang lebih tenang waktu di tanah suci",
  "kenangan jalan kaki subuh-subuh ke masjid sambil liat langit Makkah",
  "waktu pertama kali ngucap talbiyah — merinding sampai ke tulang",
  "momen di mana ngerasa doa-doa akhirnya didengar"
];

function getRandTopics(n) {
  var pool = TOPIC_POOL.slice();
  var res = [];
  for (var i = 0; i < n; i++) {
    var idx = Math.floor(Math.random() * pool.length);
    res.push(pool.splice(idx, 1)[0]);
  }
  return res;
}

window.onload = function() {
  var k = localStorage.getItem('ghazal_key');
  if (k) {
    document.getElementById('api-key').value = k;
    document.getElementById('key-ok').style.display = 'block';
  }
};

function saveKey() {
  var k = document.getElementById('api-key').value.trim();
  if (!k) return;
  localStorage.setItem('ghazal_key', k);
  var el = document.getElementById('key-ok');
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 2500);
}

function getKey() {
  return document.getElementById('api-key').value.trim() || localStorage.getItem('ghazal_key') || '';
}

function normalizeText(s) {
  return s.replace(/\n{2,}/g, '\n').trim();
}

async function generate() {
  var key = getKey();
  if (!key) { showErr('Masukkan Claude API Key dulu.'); return; }

  var topik = document.getElementById('topik').value.trim();
  var btn = document.getElementById('gen-btn');
  var loading = document.getElementById('loading');
  var output = document.getElementById('output');

  btn.disabled = true;
  loading.style.display = 'block';
  output.innerHTML = '';
  hideErr();

  var rand = getRandTopics(3);
  var tPagi  = topik || rand[0];
  var tSiang = topik || rand[1];
  var tMalam = topik || rand[2];

  var prompt =
'Kamu adalah content creator untuk brand wewangian Ghazal di Threads.\n\n' +

'BRAND GHAZAL:\n' +
'Wewangian Ghazal bukan untuk dibawa saat umroh atau haji.\n' +
'Ghazal adalah obat rindu — untuk yang sudah pulang dari tanah suci tapi hatinya masih di sana.\n' +
'Satu semprotan wewangian Ghazal, dan tiba-tiba kamu ada di sana lagi.\n' +
'Ghazal = portal waktu dalam bentuk wangi.\n\n' +

'TARGET:\n' +
'Orang yang SUDAH pernah umroh atau haji.\n' +
'Yang pulang tapi masih sering keinget momen-momen di sana.\n' +
'Usia 28-55 tahun. Religius tapi santai. Emosional soal kenangan ibadah.\n\n' +

'PRINSIP COPYWRITING YANG WAJIB DITERAPKAN:\n' +
'1. Pakai bahasa yang dipakai audiens — bukan bahasa brand\n' +
'2. Cerita spesifik lebih kuat dari kalimat umum\n' +
'3. Benefit (apa yang dirasakan) lebih kuat dari fitur (produknya)\n' +
'4. Satu ide per baris, bangun secara bertahap\n' +
'5. Hook di baris pertama — harus bikin orang berhenti scroll\n\n' +

'PRINSIP PSIKOLOGI MARKETING YANG DITERAPKAN:\n' +
'- Nostalgia trigger: bangkitkan memori spesifik yang vivid, bukan umum\n' +
'- Availability heuristic: buat momen terasa mudah dibayangkan\n' +
'- Mere exposure: sebut Ghazal secara natural di semua post, bukan hanya sekali\n' +
'- Emotional resonance: orang share karena merasa terwakili, bukan karena info\n\n' +

'CARA MENYEBUT GHAZAL — WAJIB DI SEMUA POST:\n' +
'BENAR: "wewangian Ghazal mengingatkan aku ke sana"\n' +
'BENAR: "Ghazal yang bikin aku ngerasa balik lagi ke sana"\n' +
'BENAR: "aku nemuin wewangian Ghazal dan itu yang paling dekat"\n' +
'SALAH: "Ghazal mengingatkan" (tanpa konteks wewangian)\n' +
'SALAH: "Ghazal hadir untuk kamu" (terdengar seperti iklan)\n' +
'SALAH: menyebut "Tuhan" — gunakan "Allah"\n\n' +

'MIXING TONE — campurkan natural dan puitis:\n' +
'Post pagi: lebih natural, seperti ngobrol pagi sama teman\n' +
'Post siang: campuran — mulai natural, akhiri dengan kalimat yang sedikit puitis\n' +
'Post malam: boleh lebih puitis, tapi tetap ada kalimat yang sangat membumi\n\n' +

'FORMAT:\n' +
'- Satu baris = satu ide. Gunakan \\n (satu enter) antar baris, BUKAN \\n\\n\n' +
'- Maksimal 300 karakter per post\n' +
'- Maksimal 2 hashtag di akhir\n' +
'- Maksimal 1 emoji per post\n' +
'- JANGAN mulai dengan salam, sapaan, atau "Pernahkah"\n\n' +

'TUGAS — 3 post dengan topik berbeda:\n\n' +

'POST PAGI (07:00) — natural, hangat, relatable\n' +
'Topik: ' + tPagi + '\n' +
'Angkat detail spesifik dari momen itu yang langsung bikin orang ngangguk.\n' +
'Sebut wewangian Ghazal secara ringan di akhir — seperti bisikan.\n\n' +

'POST SIANG (12:00) — campuran natural dan puitis\n' +
'Topik: ' + tSiang + '\n' +
'Ceritakan momen itu dengan satu detail yang sangat spesifik dan vivid.\n' +
'Sebut wewangian Ghazal secara natural di tengah atau akhir.\n\n' +

'POST MALAM (20:00) — emosional, boleh lebih puitis tapi tetap membumi\n' +
'Topik: ' + tMalam + '\n' +
'Bangun secara perlahan, sampai ke kalimat yang paling dalam.\n' +
'Sebut wewangian Ghazal dengan cara yang terasa seperti penemuan, bukan iklan.\n\n' +

'CONTOH YANG BENAR:\n' +
'"Ada satu hal dari umroh yang susah dilupain.\n' +
'Bukan tempatnya.\n' +
'Bukan fotonya.\n' +
'Tapi aromanya.\n' +
'Wewangian Ghazal yang paling deket sama itu.\n' +
'#Ghazal"\n\n' +

'"Pulang dari Makkah, yang pertama aku lakuin:\n' +
'buka koper dan cium pakaian ihram.\n' +
'Aromanya masih ada.\n' +
'Sekarang wewangian Ghazal yang ngejaga aroma itu tetap hidup.\n' +
'#Ghazal #RinduMakkah"\n\n' +

'CONTOH YANG SALAH:\n' +
'"Ghazal mengingatkan kita akan keindahan tanah suci yang penuh berkah dari Allah SWT."\n\n' +

'Balas HANYA JSON ini tanpa teks lain:\n' +
'{"posts":[{"slot":"pagi","content":"..."},{"slot":"siang","content":"..."},{"slot":"malam","content":"..."}]}';

  try {
    var res = await fetch('https://ghazal-proxy.ubed-fahmi.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1200,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      var errData = await res.json();
      throw new Error(errData.error && errData.error.message ? errData.error.message : 'Error ' + res.status);
    }

    var data = await res.json();
    var raw = data.content.map(function(i){ return i.text || ''; }).join('');
    var clean = raw.replace(/```json|```/g, '').trim();
    var parsed = JSON.parse(clean);
    renderPosts(parsed.posts);

  } catch(e) {
    showErr('Gagal: ' + e.message);
  }

  btn.disabled = false;
  loading.style.display = 'none';
}

var slotCfg = {
  pagi:  {emoji:'🌅', label:'Pagi',  time:'07:00', cls:'ph-pagi'},
  siang: {emoji:'☀️', label:'Siang', time:'12:00', cls:'ph-siang'},
  malam: {emoji:'🌙', label:'Malam', time:'20:00', cls:'ph-malam'}
};

function renderPosts(posts) {
  var output = document.getElementById('output');
  output.innerHTML = '';
  for (var i = 0; i < posts.length; i++) {
    var p = posts[i];
    var cfg = slotCfg[p.slot] || slotCfg.pagi;
    var bodyId = 'pb' + i;
    var btnId = 'bc' + i;
    var txt = normalizeText(p.content);
    var card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML =
      '<div class="post-head ' + cfg.cls + '">' +
        '<span class="slot-emoji">' + cfg.emoji + '</span>' +
        '<div><div class="slot-lbl">' + cfg.label + '</div><div class="slot-time">' + cfg.time + ' WIB</div></div>' +
      '</div>' +
      '<div class="post-body" id="' + bodyId + '">' + escHtml(txt) + '</div>' +
      '<div class="post-foot">' +
        '<span class="char-lbl">' + txt.length + ' karakter</span>' +
        '<button class="btn-copy" id="' + btnId + '" onclick="copyPost(\'' + bodyId + '\',\'' + btnId + '\')">Salin</button>' +
      '</div>';
    output.appendChild(card);
  }
}

function copyPost(bodyId, btnId) {
  var el = document.getElementById(bodyId);
  var btn = document.getElementById(btnId);
  var text = el.innerText || el.textContent;
  if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
    navigator.clipboard.writeText(text).then(function() {
      flashOk(btn);
    }).catch(function() { fallbackCopy(text, btn); });
    return;
  }
  fallbackCopy(text, btn);
}

function fallbackCopy(text, btn) {
  var ta = document.getElementById('copy-ta');
  ta.removeAttribute('readonly');
  ta.value = text;
  ta.focus();
  ta.select();
  var range = document.createRange();
  range.selectNodeContents(ta);
  var sel = window.getSelection();
  if (sel) { sel.removeAllRanges(); sel.addRange(range); }
  ta.setSelectionRange(0, 999999);
  var ok = false;
  try { ok = document.execCommand('copy'); } catch(e) {}
  ta.setAttribute('readonly', '');
  ta.blur();
  if (ok) { flashOk(btn); } else { flashFail(btn); }
}

function flashOk(btn) {
  btn.textContent = '✓ Tersalin';
  btn.classList.add('ok');
  setTimeout(function(){ btn.textContent = 'Salin'; btn.classList.remove('ok'); }, 2000);
}

function flashFail(btn) {
  btn.textContent = 'Coba lagi';
  setTimeout(function(){ btn.textContent = 'Salin'; }, 2000);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showErr(msg) {
  var el = document.getElementById('err-box');
  el.textContent = msg; el.style.display = 'block';
}
function hideErr() { document.getElementById('err-box').style.display = 'none'; }
</script>
</body>
</html>
